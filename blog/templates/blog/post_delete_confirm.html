{% extends 'base.html' %}
{% block content %}
<div class="max-w-lg mx-auto mt-10 bg-white p-8 rounded-2xl shadow-md text-center">
    <h2 class="text-2xl font-bold text-gray-900 mb-4">آیا از حذف این پست اطمینان دارید؟</h2>
    <p class="text-gray-600 mb-6">"{{ post.title }}"</p>
    <form method="post">
        {% csrf_token %}
        <div class="flex justify-center gap-4">
            <button type="submit" class="px-6 py-2 bg-red-600 text-white rounded-lg hover:bg-red-700 transition">بله، حذف کن</button>
            <a href="{% url 'blog:home' %}" class="px-6 py-2 bg-gray-200 text-gray-700 rounded-lg hover:bg-gray-300 transition">انصراف</a>
        </div>
    </form>
</div>
{% endblock %}
