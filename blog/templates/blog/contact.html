<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تماس با ما | وبلاگ من</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { font-family: 'Vazir', 'Tahoma', sans-serif; }
    </style>
</head>
<body class="bg-gray-50 text-gray-800 flex flex-col min-h-screen">

    <!-- نوار ناوبری -->
    <nav class="bg-white shadow-sm sticky top-0 z-50">
        <div class="container mx-auto px-4 py-3 flex items-center justify-between">
            <a href="index.html" class="text-2xl font-bold text-indigo-600">وبلاگ من</a>
            <div class="space-x-6 space-x-reverse">
                <a href="index.html" class="text-gray-700 hover:text-indigo-600 transition">خانه</a>
                <a href="about.html" class="text-gray-700 hover:text-indigo-600 transition">درباره ما</a>
                <a href="contact.html" class="text-gray-700 hover:text-indigo-600 transition">تماس با ما</a>
            </div>
        </div>
    </nav>

    <!-- محتوای اصلی -->
    <main class="flex-grow container mx-auto px-4 py-12 max-w-2xl">
        <h1 class="text-3xl font-bold text-gray-900 mb-8 text-center">تماس با من</h1>
        
        <div class="bg-white rounded-2xl shadow-md p-8">
            <p class="text-gray-600 mb-8 text-center">اگر نظر، انتقاد یا پیشنهادی دارید، از طریق فرم زیر با من در میان بگذارید.</p>
            
            <!-- فرم تماس (نمایشی - بعداً اکشن و CSRF جنگو اضافه می‌شود) -->
            <form action="#" method="POST" class="space-y-6">
                <!-- فیلد نام -->
                <div>
                    <label for="name" class="block text-sm font-medium text-gray-700 mb-1">نام</label>
                    <input type="text" id="name" name="name" required
                           class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 outline-none transition">
                </div>
                
                <!-- فیلد ایمیل -->
                <div>
                    <label for="email" class="block text-sm font-medium text-gray-700 mb-1">ایمیل</label>
                    <input type="email" id="email" name="email" required
                           class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 outline-none transition">
                </div>
                
                <!-- فیلد متن پیام -->
                <div>
                    <label for="message" class="block text-sm font-medium text-gray-700 mb-1">پیام</label>
                    <textarea id="message" name="message" rows="5" required
                              class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 outline-none transition"></textarea>
                </div>
                
                <!-- دکمه ارسال -->
                <button type="submit"
                        class="w-full bg-indigo-600 text-white py-3 rounded-lg font-medium hover:bg-indigo-700 transition">
                    ارسال پیام
                </button>
            </form>
        </div>
        
        <!-- اطلاعات تماس جایگزین -->
        <div class="mt-8 text-center text-gray-500">
            <p>یا از طریق ایمیل زیر با من در ارتباط باشید:</p>
            <a href="mailto:example@email.com" class="text-indigo-600 hover:underline">example@email.com</a>
        </div>
    </main>

    <!-- فوتر -->
    <footer class="bg-white border-t mt-auto">
        <div class="container mx-auto px-4 py-6 text-center text-gray-500 text-sm">
            © ۱۴۰۳ وبلاگ من. تمامی حقوق محفوظ است.
        </div>
    </footer>

</body>
</html>
