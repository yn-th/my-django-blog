{% extends "base.html" %}
{% block content %}

<main class="flex-grow container mx-auto px-4 py-12 max-w-md">
    <h1 class="text-3xl font-bold text-gray-900 mb-8 text-center">فراموشی رمز عبور</h1>

    <div class="bg-white rounded-2xl shadow-md p-8">
        <p class="text-gray-600 text-center mb-6">
            آدرس ایمیل خود را وارد کنید تا لینک بازنشانی برای شما ارسال شود.
        </p>

        <form method="POST" class="space-y-4">
            {% csrf_token %}

            {% for field in form %}
            <div>
                <label for="{{ field.id_for_label }}" class="block text-sm font-medium text-gray-700 mb-1">
                    {{ field.label }}
                </label>
                <input type="email" name="{{ field.name }}" id="{{ field.id_for_label }}"
                       class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 outline-none transition"
                       placeholder="example@email.com">
                {% if field.errors %}
                    <div class="text-red-600 text-sm mt-1">{{ field.errors.0 }}</div>
                {% endif %}
            </div>
            {% endfor %}

            <button type="submit"
                    class="w-full bg-indigo-600 text-white py-3 rounded-lg font-medium hover:bg-indigo-700 transition">
                ارسال لینک بازنشانی
            </button>
        </form>

        <p class="mt-6 text-center text-sm text-gray-500">
            به یاد آوردید؟
            <a href="{% url 'blog:login' %}" class="text-indigo-600 hover:underline">وارد شوید</a>
        </p>
    </div>
</main>

{% endblock content %}
