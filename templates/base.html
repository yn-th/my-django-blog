<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>خانه | وبلاگ من</title>
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { font-family: 'Vazir', 'Tahoma', sans-serif; }
    </style>
</head>

<body class="bg-gray-50 text-gray-800 flex flex-col min-h-screen">
{% if messages %}
    <div class="container mx-auto px-4 mt-4 space-y-2">
        {% for message in messages %}
            <div class="px-4 py-3 rounded-lg text-sm 
                {% if message.tags == 'success' %}
                    bg-green-50 text-green-800 border border-green-300
                {% elif message.tags == 'error' %}
                    bg-red-50 text-red-800 border border-red-300
                {% elif message.tags == 'warning' %}
                    bg-yellow-50 text-yellow-800 border border-yellow-300
                {% else %}
                    bg-blue-50 text-blue-800 border border-blue-300
                {% endif %}
            ">
                {{ message }}
            </div>
        {% endfor %}
    </div>
{% endif %}
    <!-- نوار ناوبری -->
    <nav class="bg-white shadow-sm sticky top-0 z-50">
        <div class="container mx-auto px-4 py-3 flex items-center justify-between">
            <a href="index.html" class="text-2xl font-bold text-indigo-600">وبلاگ من</a>
            <div class="space-x-6 space-x-reverse">
                <a href="index.html" class="text-gray-700 hover:text-indigo-600 transition">خانه</a>
                <a href="{% url 'blog:dashboard' %}" class="text-gray-700 hover:text-indigo-600 transition"> داشبورد</a>
                <a href="{% url 'blog:create' %}" class="text-gray-700 hover:text-indigo-600 transition">افزدون پست</a>
                <a href="{% url 'blog:my_profile'  %}" class="text-gray-700 hover:text-indigo-600 transition"> پروفایل</a>
                <a href="blog/about.html" class="text-gray-700 hover:text-indigo-600 transition">درباره ما</a>
                <a href="contact.html" class="text-gray-700 hover:text-indigo-600 transition">تماس با ما</a>
            </div>
        </div>
    </nav>


    <main class="flex-grow container mx-auto px-4 py-8">
        {% block content %}
        
        {% endblock content %}
    </main>

        <!-- صفحه‌بندی (بعداً داینامیک می‌شود) -->
        <div class="flex justify-center mt-12 space-x-2 space-x-reverse">
            <a href="#" class="px-4 py-2 bg-white border rounded-lg hover:bg-gray-100">قبلی</a>
            <a href="#" class="px-4 py-2 bg-indigo-600 text-white rounded-lg">۱</a>
            <a href="#" class="px-4 py-2 bg-white border rounded-lg hover:bg-gray-100">۲</a>
            <a href="#" class="px-4 py-2 bg-white border rounded-lg hover:bg-gray-100">بعدی</a>
        </div>
    </main>

    <!-- فوتر -->
    <footer class="bg-white border-t mt-auto">
        <div class="container mx-auto px-4 py-6 text-center text-gray-500 text-sm">
            © ۱۴۰۳ وبلاگ من. تمامی حقوق محفوظ است.
        </div>
    </footer>

</body>
</html>
